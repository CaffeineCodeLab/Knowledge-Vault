<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Vault</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap">
</head>
<body>
    <!-- NAVBAR -->
     <nav class="navbar">
        <div class="nav-container">

            <div class="nav-logo">
                <img src="assets/logo-navbar.png" alt="Knowledge Vault Logo"/>
            </div>
            <ul class="nav-links">
                <li><a href="#">Features</a></li>
                <li><a href="#">How It Works</a></li>
                <li><a href="#">Why It's Different</a></li>
            </ul>
            <button class="btn-primary">Get Early Access</button>
        </div>
     </nav>

     <!-- BANNER -->
      <section class="banner">
        <div class="banner-content">
            <div class="badge">
                <span class="badge-dot"></span>
                Early Access Now Open
            </div>

            <h1>
               Structured Thinking, <br>
               <span class="highlight">Not Just Note-Taking.</span>
            </h1>

                A private space to store notes, links, and learning summaries — designed to
      help you think clearly, connect ideas, and turn learning into long-term knowledge.
            </p>

            <div class="banner-buttons">
                <button class="btn-primary">
                    Start Building Your Vault
                    <img src="assets/ArrowRight.png" alt="arrow"/>
                </button>
                <button class="btn-secondary">
                    <span class="play-icon">&#9654;</span>
                     See How It Works
                </button>

        </div>
